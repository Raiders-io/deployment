<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dashboard Testing Lesson and Objects</title>

<body>
<h1><img src="favicon.png" alt="favicon" class="favicon">Raiders.io</h1>

<h2>Object Storage API</h2>
<h3>POST Signup</h3>
	<!-- Formulaire de login -->
	<form id="signupForm">
		<label for="fullName"><b>First Name</b></label>
		<input type="text" placeholder="Enter First Name" name="fullName" required><br>

		<label for="email"><b>Email</b></label>
		<input type="text" placeholder="Enter Email" name="email" required><br>
		
		<label for="password"><b>Password</b></label>
		<input type="password" placeholder="Enter Password" name="password" required><br>
		
		<label for="passwordConfirmation"><b>Confirm Password</b></label>
		<input type="password" placeholder="Confirm Password" name="passwordConfirmation" required><br>
		
		<label>
			<input type="checkbox" checked="checked" name="remember"> Remember me
		</label><br>
		
		<button type="submit">Signup</button>
  </form>

<h3>POST Login</h3>
	<!-- Formulaire de login -->
	<form id="loginForm">
		<label for="email"><b>Email</b></label>
		<input type="text" placeholder="Enter Email" name="email" required><br>
		
		<label for="password"><b>Password</b></label>
		<input type="password" placeholder="Enter Password" name="password" required><br>
		
		<label>
			<input type="checkbox" checked="checked" name="remember"> Remember me
		</label><br>
		
		<button type="submit">Login</button>
  </form>

<h3>GET Profile</h3>
	<!-- Formulaire de Profile -->
	<form id="profileForm">
		<button type="submit">Get Profile</button>
	</form>

<h3>Upload Files</h3>
	<!-- Formulaire d'upload de fichiers -->
	<form id="filesForm" enctype="multipart/form-data">
		<div>
		<label for="file">Choose file(s) to upload</label><br>
		<input type="file" id="file" name="file" multiple />
		</div><br>
		<div>
		<button type="submit">Submit</button>
		</div>
	</form>

<h3>Update File</h3>
	<!-- Formulaire de mise à jour de fichier -->
	<form id="updateFileForm" enctype="multipart/form-data">
		<div>
		<label for="updateFile">Choose new file</label><br>
		<input type="file" id="updateFile" name="updateFile" required />
		</div><br>
		<div>
		<button type="submit">Submit</button>
		</div>
	</form>

<h3>Delete File</h3>
	<!-- Formulaire de suppression de fichier -->
	<form id="deleteFileForm" enctype="multipart/form-data">
		<div>
		<label for="deleteFileName">File name to delete</label><br>
		<input type="text" placeholder="Enter File Name" name="deleteFileName" required><br>
		</div><br>
		<div>
		<button type="submit">Submit</button>
		</div>
	</form>

<h3>Update Multiple Files</h3>
	<!-- Formulaire de mise à jour multiple de fichiers -->
	<form id="updateMultipleFilesForm" enctype="multipart/form-data">
		<div>
		<label for="updateMultipleFiles">Choose new file(s)</label><br>
		<input type="file" id="updateMultipleFiles" name="updateMultipleFiles" multiple required />
		</div><br>
		<div>
		<button type="submit">Submit</button>
		</div>
	</form>

<h3>Delete Multiple Files</h3>
	<!-- Formulaire de suppression multiple de fichiers -->
	<form id="deleteMultipleFilesForm">
		<div>
		<label for="deleteFileNames">File names to delete (one per line)</label><br>
		<textarea id="deleteFileNames" name="deleteFileNames" placeholder="file1.txt&#10;file2.pdf&#10;file3.doc" required></textarea>
		</div><br>
		<div>
		<button type="submit">Submit</button>
		</div>
	</form>

<h3>Index of files</h3>
	<!-- Formulaire d'upload de fichiers -->
	<form id="indexFilesForm" enctype="multipart/form-data">
		<div>
		<button type="submit">Submit</button>
		</div>
	</form>
<div id="fileExplorer">
	<div id="fileList">
	    <!-- Les fichiers seront générés ici -->
  	</div>
</div>

<h3>Show Specific File</h3>
	<!-- Formulaire d'upload de fichiers -->
	<form id="showFileForm" enctype="multipart/form-data">
		<div>
		<label for="file">Choose file name to search</label><br>
		<input type="text" placeholder="Enter File Name" name="fileName" required><br>
		</div><br>
		<div>
		<button type="submit">Submit</button>
		</div>
	</form>

<script>
	let authToken = null;

// Object Storage API - Signup
document.getElementById('signupForm').addEventListener('submit', async (e) => {
	e.preventDefault();
	const form = e.target;

	const res = await fetch('http://127.0.0.1:3334/api/v1/auth/signup', {
		method: 'POST',
		headers: { 'Content-Type': 'application/json' },
		body: JSON.stringify({
			fullName: form.fullName.value,
			email: form.email.value,
			password: form.password.value,
			passwordConfirmation: form.passwordConfirmation.value,
		}),
	});

	const json = await res.json();
	if (!res.ok) {
		console.error('Signup error :', json);
		alert('Signup failed: ' + (json.message || 'Unknown error'));
		return;
	}
	authToken = json.data.token;
	console.log('Token récupéré :', authToken);
	alert('Connected! You can now upload your avatar.');
});

// Object Storage API - Login
document.getElementById('loginForm').addEventListener('submit', async (e) => {
	e.preventDefault();
	const form = e.target;

	const res = await fetch('http://127.0.0.1:3334/api/v1/auth/login', {
		method: 'POST',
		headers: { 'Content-Type': 'application/json' },
		body: JSON.stringify({
			email: form.email.value,
			password: form.password.value,
		}),
	});

	const json = await res.json();
	if (!res.ok) {
		console.error('Login error :', json);
		alert('Login failed: ' + (json.message || 'Unknown error'));
		return;
	}
	authToken = json.data.token;
	console.log('Token récupéré :', authToken);
	alert('Connected! You can now upload your avatar.');
});

// Object Storage API - get profile
document.getElementById('profileForm').addEventListener('submit', async (e) => {
	e.preventDefault();
	const form = e.target;

	if (!authToken) {
		alert('Please login first !');
		return;
	}

	const res = await fetch('http://127.0.0.1:3334/api/v1/account/profile', {
		method: 'GET',
		headers: {
			'Authorization': `Bearer ${authToken}`,
		},
	});
	const json = await res.text();
	console.log('Response profile :', json);
});

// Upload files
document.getElementById('filesForm').addEventListener('submit', async (e) => {
	e.preventDefault();

	const formData = new FormData();
	await uploadMultipleFiles(document.getElementById('file'));
});

// Update single file by name
document.getElementById('updateFileForm').addEventListener('submit', async (e) => {
	e.preventDefault();

	await updateFile(document.getElementById('updateFile'));
});

// Update multiple files by their names
document.getElementById('updateMultipleFilesForm').addEventListener('submit', async (e) => {
	e.preventDefault();

	await updateMultipleFile(document.getElementById('updateMultipleFiles'));
});

// Delete single file by name
document.getElementById('deleteFileForm').addEventListener('submit', async (e) => {
	e.preventDefault();

	const form = e.target;
	await deleteFile(form.fileName.value);
});

// Delete multiple files by names
document.getElementById('deleteMultipleFilesForm').addEventListener('submit', async (e) => {
	e.preventDefault();

	const form = e.target;
	const fileNames = form.deleteFileNames.value
		.split('\n')
		.map(name => name.trim())
		.filter(name => name.length > 0);

	if (fileNames.length === 0) {
		alert('Please enter at least one file name');
		return;
	}
	console.log('Deleting files:', fileNames);
	await deleteMultipleFiles(fileNames);
});

// Index of files
document.getElementById('indexFilesForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    if (!authToken) {
        alert('Please login first !');
        return;
    }

    try {
        const res = await fetch('http://127.0.0.1:3334/storage/objects', {
            method: 'GET',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${authToken}`,
            },
        });
        
        const json = await res.json(); // Utilisez .json() au lieu de .text()
        console.log('Response :', json);
        
        // Afficher les fichiers
        displayFiles(json.objects);
        
    } catch (error) {
        console.error('Erreur :', error);
        document.getElementById('fileList').innerHTML = 
            '<p style="color: red;">❌ Erreur lors du chargement des fichiers</p>';
    }
});

// Show Specific File
document.getElementById('showFileForm').addEventListener('submit', async (e) => {
	e.preventDefault();
	const form = e.target;

	await downloadFile(form.fileName.value);
});

// Waits a fileInput from a document.getElementById()
async function uploadMultipleFiles(fileInput) {
	if (!fileInput) {
		alert('Please add at least one file');
		return;
	}
	if (!authToken) {
		alert('Please login first !');
		return;
	}

	const formData = new FormData();
	for (const file of fileInput.files) {
		formData.append('files[]', file); // files[] est le nom du type pour le validator
	}

	const res = await fetch('http://127.0.0.1:3334/storage/objects', {
		method: 'POST',
		headers: { 'Authorization': `Bearer ${authToken}` },
		body: formData,
	});

	const json = await res.text();
	console.log('Response upload :', json);
} 

// Waits a fileInput from a document.getElementById()
async function updateFile(fileInput) {
	if (!fileInput) {
		alert('Please add at least one file');
		return;
	}
	if (!authToken) {
		alert('Please login first !');
		return;
	}

	if (fileInput.files.length !== 1) {
		alert('Please select exactly one file to update.');
		return;
	}
	const formData = new FormData();
	formData.append('file', fileInput.files[0]);

	const res = await fetch(`http://127.0.0.1:3334/storage/objects/${fileInput.files[0].name}`, {
		method: 'PUT',
		headers: {
			'Authorization': `Bearer ${authToken}`,
		},
		body: formData,
	});

	const json = await res.text();
	console.log('Response update :', json);
	alert('File updated successfully');
} 

// Waits a fileInput from a document.getElementById()
async function updateMultipleFile(fileInput) {
	if (!fileInput) {
		alert('Please add at least one file');
		return;
	}
	if (!authToken) {
		alert('Please login first !');
		return;
	}

	const formData = new FormData();
	for (const file of fileInput.files) {
		formData.append('files[]', file);
	}

	const res = await fetch('http://127.0.0.1:3334/storage/objects/', {
		method: 'PUT',
		headers: {
			'Authorization': `Bearer ${authToken}`,
		},
		body: formData,
	});

	const json = await res.text();
	console.log('Response update :', json);
	alert('Files updated successfully');
} 

// Fonction pour créer dynamiquement la liste des fichiers
function displayFiles(files) {
    const fileList = document.getElementById('fileList');
    
    if (!files || files.length === 0) {
        fileList.innerHTML = '<p>📂 Aucun fichier trouvé</p>';
        return;
    }
	let html = `<h4>📁 Explorateur de fichiers</h4>`;
    html += `
        <table class="file-table">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Taille</th>
                    <th>Type</th>
                    <th>Visibilité</th>
                    <th>Date de création</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
    `;
	total_size = Number(0);
    files.forEach(file => {
		total_size += Number(file.sizeBytes);
        const size = formatFileSize(file.sizeBytes);
        const date = formatDate(file.createdAt);

		html += `
            <tr>
                <td class="file-name">
                    <span class="file-icon">${getFileIcon(file.mimeType, file.name)}</span>
                    ${file.name}
                </td>
                <td>${size}</td>
                <td>${file.mimeType}</td>
                <td>
                    <span class="visibility-badge ${file.visibility}">
                        ${file.visibility === 'private' ? '🔒' : '🌍'} ${file.visibility}
                    </span>
                </td>
                <td>${date}</td>
                <td>
                    <button onclick="downloadFile('${file.name}')" class="btn-action">📥</button>
                    <button onclick="deleteFile('${file.name}')" class="btn-action btn-danger">🗑️</button>
                </td>
            </tr>
        `;
    });

	html += `
		<tfoot>
			<tr>
				<td colspan="3">Total : ${files.length} fichier(s)</td>
				<td colspan="3">Espace total utilisé : ${formatFileSize(total_size)}</td>
			</tr>
		</tfoot>`;

    html += '</tbody></table>';
    
    fileList.innerHTML = html;
}

// Utilitaires
function formatFileSize(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('fr-FR', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

function getFileIcon(mimeType) {
    // Icônes par type MIME
    const icons = {
        'text': '📝',
        'text/plain': '📝',
        'text/html': '🌐',
        'text/css': '🎨',
        'text/javascript': '⚡',
        'text/markdown': '📄',
        'image': '🖼️',
        'image/jpeg': '🖼️',
        'image/png': '🖼️',
        'image/gif': '🎭',
        'image/svg+xml': '🔷',
        'image/webp': '🖼️',
        'audio': '🎵',
        'audio/mpeg': '🎵',
        'audio/wav': '🎵',
        'audio/ogg': '🎵',
        'video': '🎬',
        'video/mp4': '🎬',
        'video/webm': '🎬',
        'application/pdf': '📕',
        'application/json': '📋',
        'application/xml': '📋',
        'application/zip': '📦',
        'application/gzip': '📦',
        'application/x-tar': '📦',
        'application/x-rar-compressed': '📦',
        'application/x-7z-compressed': '📦',
        'application/msword': '📘',
        'application/vnd.openxmlformats-officedocument.wordprocessingml.document': '📘',
        'application/vnd.ms-excel': '📊',
        'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': '📊',
        'application/vnd.ms-powerpoint': '📽️',
        'application/vnd.openxmlformats-officedocument.presentationml.presentation': '📽️',
        'application/javascript': '⚡',
        'application/typescript': '⚡',
        'application/wasm': '🔧',
        'application/octet-stream': '📎',
        'directory': '📁',
        'folder': '📁',
    };

    // Vérification exacte du type MIME
    if (icons[mimeType]) {
        return icons[mimeType];
    }

    // Vérification par catégorie (première partie du type MIME)
    const category = mimeType.split('/')[0];
    if (icons[category]) {
        return icons[category];
    }

    // Extension du fichier (fallback)
    const extensionIcons = {
        'js': '⚡',
        'ts': '⚡',
        'jsx': '⚛️',
        'tsx': '⚛️',
        'py': '🐍',
        'java': '☕',
        'cpp': '🔧',
        'c': '🔧',
        'h': '🔧',
        'rs': '🦀',
        'sh': '💻',
        'bash': '💻',
        'bat': '💻',
        'ps1': '💻',
        'yaml': '📋',
        'yml': '📋',
        'toml': '📋',
        'conf': '⚙️',
        'env': '🔐',
        'gitignore': '🙈',
        'dockerfile': '🐳',
        'makefile': '🔨',
        'md': '📄',
        'txt': '📝',
        'svg': '🔷',
        'ico': '🔶',
    };

    // Essayer de trouver par extension
    if (fileName) {
        const extension = fileName.split('.').pop()?.toLowerCase();
        if (extension && extensionIcons[extension]) {
            return extensionIcons[extension];
        }
    }

    // Icône par défaut si rien n'est trouvé
    return '📄';
}

async function downloadFile(fileName) {
	if (!fileName) {
		alert('Please enter a file name to download.');
		return;
	}
	if (!authToken) {
		alert('Please login first !');
		return;
	}
	const res = await fetch(`http://127.0.0.1:3334/storage/objects/${fileName}`, {
		method: 'GET',
		headers: { 'Authorization': `Bearer ${authToken}` },
	});

	if (!res.ok) {
		const errorBody = await res.text();
		console.error('Show file error :', errorBody);
		alert(`Failed to fetch file (${res.status})`);
		return;
	}

	const blob = await res.blob();
	const url = window.URL.createObjectURL(blob);
	const a = document.createElement('a');
	a.href = url;
	a.download = `${fileName}`;
	a.click();
	window.URL.revokeObjectURL(url);
}

async function deleteFile(fileName) {
	if (!fileName) {
		alert('Please enter a file name to delete.');
		return;
	}
	if (!authToken) {
		alert('Please login first !');
		return;
	}
	const res = await fetch(`http://127.0.0.1:3334/storage/objects/${fileName}`, {
		method: 'DELETE',
		headers: {
			'Authorization': `Bearer ${authToken}`,
		},
	});

	const json = await res.text();
	console.log('Response delete :', json);
	alert('File deleted successfully');
}

// Waits a fileName Array
async function deleteMultipleFiles(fileNames) {
	if (!fileNames || fileNames.length === 0) {
		alert('Please enter at least one file name');
		return;
	}
	if (!authToken) {
		alert('Please login first !');
		return;
	}
	const res = await fetch('http://127.0.0.1:3334/storage/objects/', {
		method: 'DELETE',
		headers: {
			'Authorization': `Bearer ${authToken}`,
			'Content-Type': 'application/json',
		},
		body: JSON.stringify({ ids: fileNames }),
	});

	const json = await res.text();
	console.log('Response delete :', json);
	alert('Files deleted successfully');
}

</script>
