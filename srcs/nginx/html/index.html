<script>
	// Fonctions utilitaires pour les cookies
	function setCookie(name, value, days = 7) {
		const expires = new Date(Date.now() + days * 864e5).toUTCString();
		document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Strict`;
	}

	function getCookie(name) {
		return document.cookie.split('; ').reduce((r, v) => {
			const parts = v.split('=');
			return parts[0] === name ? decodeURIComponent(parts[1]) : r;
		}, '');
	}

	function deleteCookie(name) {
		document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
	}

	// Récupération du token au chargement de la page
	let authToken = getCookie('authToken') || null;

// Object Storage API - Signup
document.getElementById('signupForm').addEventListener('submit', async (e) => {
	e.preventDefault();
	const form = e.target;

	const res = await fetch('https://127.0.0.1:4443/api/v1/storage/auth/signup', {
		method: 'POST',
		headers: { 'Content-Type': 'application/json' },
		body: JSON.stringify({
			fullName: form.fullName.value,
			email: form.email.value,
			password: form.password.value,
			passwordConfirmation: form.passwordConfirmation.value,
		}),
	});

	const json = await res.json();
	if (!res.ok) {
		console.error('Signup error :', json);
		alert('Signup failed: ' + (json.message || 'Unknown error'));
		return;
	}
	authToken = json.data.token;
	setCookie('authToken', authToken);
	console.log('Token récupéré :', authToken);
	alert('Connected! You are now registered and logged in.');
});

async function fetchFiles(page = 1, limit = 10) {
	if (!authToken) {
		alert('Please login first !');
		return;
	}

	try {
        const res = await fetch(`https://127.0.0.1:4443/api/v1/storage/objects/?page=${page}&limit=${limit}`, {
            method: 'GET',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${authToken}`,
            },
        });
        
        const json = await res.json();
        console.log('Response :', json);
        
        // Afficher les fichiers
        displayFiles(json.objects);
        
    } catch (error) {
        console.error('Erreur :', error);
        document.getElementById('fileList').innerHTML = 
            '<p style="color: red;">❌ Erreur lors du chargement des fichiers</p>';
    }
}

// Waits a fileInput from a document.getElementById()
async function uploadMultipleFiles(fileInput) {
	if (!fileInput) {
		alert('Please add at least one file');
		return;
	}
	if (!authToken) {
		alert('Please login first !');
		return;
	}

	const formData = new FormData();
	for (const file of fileInput.files) {
		formData.append('files[]', file); // files[] est le nom du type pour le validator
	}

	const res = await fetch('https://127.0.0.1:4443/api/v1/storage/objects', {
		method: 'POST',
		headers: { 'Authorization': `Bearer ${authToken}` },
		body: formData,
	});

	const json = await res.text();
	console.log('Response upload :', json);
} 

// Waits a fileInput from a document.getElementById()
async function updateFile(fileInput) {
	if (!fileInput) {
		alert('Please add at least one file');
		return;
	}
	if (!authToken) {
		alert('Please login first !');
		return;
	}

	if (fileInput.files.length !== 1) {
		alert('Please select exactly one file to update.');
		return;
	}
	const formData = new FormData();
	formData.append('file', fileInput.files[0]);

	const res = await fetch(`https://127.0.0.1:4443/api/v1/storage/objects/${fileInput.files[0].name}`, {
		method: 'PUT',
		headers: {
			'Authorization': `Bearer ${authToken}`,
		},
		body: formData,
	});

	const json = await res.text();
	console.log('Response update :', json);
	alert('File updated successfully');
} 

// Waits a fileInput from a document.getElementById()
async function updateMultipleFile(fileInput) {
	if (!fileInput) {
		alert('Please add at least one file');
		return;

	if (!authToken) {
		alert('Please login first !');
		return;
	}

	const formData = new FormData();
	for (const file of fileInput.files) {

	}

	const res = await fetch('https://127.0.0.1:4443/api/v1/storage/objects/', {
		method: 'PUT',

			'Authorization': `Bearer ${authToken}`,
		},
		body: formData,
	});

	const json = await res.text();
	console.log('Response update :', json);
	alert('Files updated successfully');
}

// Fonction pour créer dynamiquement la liste des fichiers
function displayFiles(object) {
    const fileList = document.getElementById('fileList');
    
    if (!object || object.length === 0) {
        fileList.innerHTML = '<p>📂 Aucun fichier trouvé</p>';
        return;
    }
	let html = `<h4>📁 Explorateur de fichiers</h4>`;

	html += `
		<form action="" method="get" class="file-actions">
			<span class="beforeTable">
				<span class="quick-actions">
					<label for="selectAll">Select All</label>
					<input type="checkbox" onclick="toggleSelectAll()"/>
					<button type="button" onclick="downloadSelectedFiles()" class="btn-action">📥 Download Selected</button>	
					<button type="button" onclick="deleteSelectedFiles()" class="btn-action btn-danger">🗑️ Delete Selected</button>	
				</span>
		`;
	
	// If files contains meta, it means that the response is paginated and we need to access the data property
	if (object.meta == undefined) {
		files = object;
		object.meta = {
			currentPage: 1,
			lastPage: 1
		};
	}else {
		files = object.data;
	}

	html += `
		<span class="pagination-controls">
			<button type="button" id="prevPage" class="page-button">&lt;</button>
			<span id="currentPage">${object.meta.currentPage}</span>
			<span id="totalPages"> / ${object.meta.lastPage}</span>
			<button type="button" id="nextPage" class="page-button">&gt;</button>
		</span>
		</span>
		`;
    html += `
        <table class="file-table">
            <thead>
                <tr>
					<th>Select</th>
					<th>Icon</th>
                    <th>Nom</th>
                    <th>Taille</th>
                    <th>Type</th>
                    <th>Visibilité</th>
                    <th>Date de création</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
    `;
	total_size = Number(0);
    files.forEach(file => {
		total_size += Number(file.sizeBytes);
        const size = formatFileSize(file.sizeBytes);
        const date = formatDate(file.createdAt);

		html += `
            <tr id="table-file-${file.name}" >
				<td class="file-selected">
					<input type="checkbox" onclick="updateSelectedCount()"/>
				</td>
				<td class="file-icon">${getFileIcon(file.mimeType, file.name)}</td>
                <td class="file-name">${file.name}</td>
                <td class="file-size">${size}</td>
                <td>${file.mimeType}</td>
                <td>
                    <span class="visibility-badge ${file.visibility}">
                        ${file.visibility === 'private' ? '🔒' : '🌍'}
                    </span>
                </td>
                <td>${date}</td>
                <td>
                    <button type="button" onclick="downloadFile('${file.name}')" class="btn-action">📥</button>
                    <button type="button" onclick="deleteFile('${file.name}')" class="btn-action btn-danger">🗑️</button>
                </td>
            </tr>
        `;
    });
	html += `
		<tfoot>
			<tr>
				<td colspan="2">Selected : <span id="selectedCount">0</span></td>
				<td colspan="3" id="totalFiles">Total : ${files.length} fichier(s)</td>
				<td colspan="3" id="totalFileSize">Espace total utilisé : ${formatFileSize(total_size)}</td>
			</tr>
		</tfoot>`;

    html += '</tbody></table></form>';

    fileList.innerHTML = html;
	document.getElementById('nextPage').addEventListener('click', fetchNextPage);
	document.getElementById('prevPage').addEventListener('click', fetchPreviousPage);
}

function fetchNextPage() {
	const currentPage = parseInt(document.getElementById('currentPage').textContent);
	const totalPages = parseInt(document.getElementById('totalPages').textContent.replace('/', ''));
	if (currentPage < totalPages) {
		fetchFiles(currentPage + 1);
		document.getElementById('currentPage').textContent = `${currentPage + 1}`;
	}
}

function fetchPreviousPage() {
	const currentPage = parseInt(document.getElementById('currentPage').textContent);
	if (currentPage > 1) {
		fetchFiles(currentPage - 1);
		document.getElementById('currentPage').textContent = `${currentPage - 1}`;
	}
}

function updateSelectedCount() {
	const checkboxes = document.querySelectorAll('#fileList tbody input[type="checkbox"]');
	const selectedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
	document.getElementById('selectedCount').textContent = selectedCount;
}

function toggleSelectAll() {
	const selectAllCheckbox = document.querySelector('#fileList input[type="checkbox"]');
	const checkboxes = document.querySelectorAll('#fileList tbody input[type="checkbox"]');
	checkboxes.forEach(cb => cb.checked = selectAllCheckbox.checked);
	updateSelectedCount();
}

// Utilitaires
function formatFileSize(bytes) {
    if (bytes === 0 || isNaN(bytes) || bytes == "0") return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('fr-FR', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

function getFileIcon(mimeType) {
    // Icônes par type MIME
    const icons = {
        'text': '📝',
        'text/plain': '📝',
        'text/html': '🌐',
        'text/css': '🎨',
        'text/javascript': '⚡',
        'text/markdown': '📄',
        'image': '🖼️',
        'image/jpeg': '🖼️',
        'image/png': '🖼️',
        'image/gif': '🎭',
        'image/svg+xml': '🔷',
        'image/webp': '🖼️',
        'audio': '🎵',
        'audio/mpeg': '🎵',
        'audio/wav': '🎵',
        'audio/ogg': '🎵',
        'video': '🎬',
        'video/mp4': '🎬',
        'video/webm': '🎬',
        'application/pdf': '📕',
        'application/json': '📋',
        'application/xml': '📋',
        'application/zip': '📦',
        'application/gzip': '📦',
        'application/x-tar': '📦',
        'application/x-rar-compressed': '📦',
        'application/x-7z-compressed': '📦',
        'application/msword': '📘',
        'application/vnd.openxmlformats-officedocument.wordprocessingml.document': '📘',
        'application/vnd.ms-excel': '📊',
        'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': '📊',
        'application/vnd.ms-powerpoint': '📽️',
        'application/vnd.openxmlformats-officedocument.presentationml.presentation': '📽️',
        'application/javascript': '⚡',
        'application/typescript': '⚡',
        'application/wasm': '🔧',
        'application/octet-stream': '📎',
        'directory': '📁',
        'folder': '📁',
    };

    // Vérification exacte du type MIME
    if (icons[mimeType]) {
        return icons[mimeType];
    }

    // Vérification par catégorie (première partie du type MIME)
    const category = mimeType.split('/')[0];
    if (icons[category]) {
        return icons[category];
    }

    // Extension du fichier (fallback)
    const extensionIcons = {
        'js': '⚡',
        'ts': '⚡',
        'jsx': '⚛️',
        'tsx': '⚛️',
        'py': '🐍',
        'java': '☕',
        'cpp': '🔧',
        'c': '🔧',
        'h': '🔧',
        'rs': '🦀',
        'sh': '💻',
        'bash': '💻',
        'bat': '💻',
        'ps1': '💻',
        'yaml': '📋',
        'yml': '📋',
        'toml': '📋',
        'conf': '⚙️',
        'env': '🔐',
        'gitignore': '🙈',
        'dockerfile': '🐳',
        'makefile': '🔨',
        'md': '📄',
        'txt': '📝',
        'svg': '🔷',
        'ico': '🔶',
    };

    // Essayer de trouver par extension
    if (fileName) {
        const extension = fileName.split('.').pop()?.toLowerCase();
        if (extension && extensionIcons[extension]) {
            return extensionIcons[extension];
        }
    }

    // Icône par défaut si rien n'est trouvé
    return '📄';
}

async function downloadFile(fileName) {
	if (!fileName) {
		alert('Please enter a file name to download.');
		return;
	}
	if (!authToken) {
		alert('Please login first !');
		return;
	}
	const res = await fetch(`https://127.0.0.1:4443/api/v1/storage/objects/${fileName}`, {
		method: 'GET',
		headers: { 'Authorization': `Bearer ${authToken}` },
	});

	if (!res.ok) {
		const errorBody = await res.text();
		console.error('Show file error :', errorBody);
		alert(`Failed to fetch file (${res.status})`);
		return;
	}

	const blob = await res.blob();
	const url = window.URL.createObjectURL(blob);
	const a = document.createElement('a');
	a.href = url;
	a.download = `${fileName}`;
	a.click();
	window.URL.revokeObjectURL(url);
}

async function deleteFile(fileName) {
	if (!fileName) {
		alert('Please enter a file name to delete.');
		return;
	}
	if (!authToken) {
		alert('Please login first !');
		return;
	}
	const res = await fetch(`https://127.0.0.1:4443/api/v1/storage/objects/${fileName}`, {
		method: 'DELETE',
		headers: {
			'Authorization': `Bearer ${authToken}`,
		},
	});

	const json = await res.text();
	console.log('Response delete :', json);
	deleteTableRow(fileName);
	// alert('File deleted successfully');
}

function deleteTableRow(fileName) {
	if (!fileName) {
		return;
	}
	const row = document.getElementById(`table-file-${fileName}`);
	if (!row) {
		return ;
	}
	row.remove();
	updateSelectedCount();
	updateTotalFilesCount();
	updateTotalSize();
}

function deleteTableRows(fileNames) {
	if (!fileNames || fileNames.length === 0) {
		return;
	}
	for (const fileName of fileNames) {
		const row = document.getElementById(`table-file-${fileName}`);
		if (row) {
			row.remove();
		}
	}
	updateSelectedCount();
	updateTotalFilesCount();
	updateTotalSize();
}

// Waits a fileName Array
async function deleteMultipleFiles(fileNames) {
	if (!fileNames || fileNames.length === 0) {
		alert('Please enter at least one file name');
		return;
	}
	if (!authToken) {
		alert('Please login first !');
		return;
	}
	const res = await fetch('https://127.0.0.1:4443/api/v1/storage/objects/', {
		method: 'DELETE',
		headers: {
			'Authorization': `Bearer ${authToken}`,
			'Content-Type': 'application/json',
		},
		body: JSON.stringify({ ids: fileNames }),
	});

	const json = await res.text();
	console.log('Response delete :', json);
	deleteTableRows(fileNames);
	// alert('Files deleted successfully');
}

function updateTotalFilesCount() {
	const totalFiles = document.querySelectorAll('#fileList tbody tr');
	if (!totalFiles)
		return;
	document.getElementById('totalFiles').textContent = `Total : ${totalFiles.length} fichier(s)`;
}

function updateTotalSize() {
	const item = document.getElementById('totalFileSize');
	if (!item)
		return;
	const rows = document.querySelectorAll('#fileList tbody tr');
	if (!rows)
		return;
	let totalSize = 0;
	rows.forEach(row => {
		const sizeCell = row.getElementsByClassName('file-size');
		if (sizeCell && sizeCell[0]) {
			totalSize += parseInt(sizeCell[0].textContent);
		}
	});
	item.textContent = `Espace total utilisé : ${formatFileSize(totalSize)}`;
}

async function downloadSelectedFiles() {
	const checkboxes = document.querySelectorAll('#fileList tbody input[type="checkbox"]');
	const selectedFiles = Array.from(checkboxes)
		.filter(cb => cb.checked)
		.map(cb => cb.closest('tr').querySelector('.file-name').textContent.trim());

	if (selectedFiles.length === 0) {
		alert('Please select at least one file to download.');
		return;
	}

	for (const fileName of selectedFiles) {
		await downloadFile(fileName);
	}
}

async function deleteSelectedFiles() {
	const checkboxes = document.querySelectorAll('#fileList tbody input[type="checkbox"]');
	const selectedFiles = Array.from(checkboxes)
		.filter(cb => cb.checked)
		.map(cb => cb.closest('tr').querySelector('.file-name').textContent.trim());

	if (selectedFiles.length === 0) {
		alert('Please select at least one file to delete.');
		return;
	}

	await deleteMultipleFiles(selectedFiles);
	console.log('Selected files deleted:', selectedFiles.length);
	console.log('Selected files deleted:', selectedFiles.length);
	if (document.querySelectorAll('#fileList tbody tr').length == 0) {
		fetchFiles(); // Refresh the file list if all files in current page were deleted
	}
}
