<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Dashboard Testing Lesson and Objects</title>
	<link rel="stylesheet" href="stylesheet.css">
	<script async src="script.js"></script>
</head>
<body>
<h1>Object Storage API</h1>

<h2>Object Storage API - Login</h2>
	<!-- Formulaire de login -->
	<form id="loginForm">
	<div class="container">
		<label for="email"><b>Email</b></label>
		<input type="text" placeholder="Enter Email" name="email" required><br>
		
		<label for="password"><b>Password</b></label>
		<input type="password" placeholder="Enter Password" name="password" required><br>
		
		<label>
			<input type="checkbox" checked="checked" name="remember"> Remember me
		</label><br>
		
		<button type="submit">Login</button>
	</div>
  </form>

<h2>Lesson API</h2>
<h3>Create Lesson</h3>
	<!-- Formulaire d'upload d'avatar -->
	<form id="createLessonForm" enctype="multipart/form-data">
		<div>
		<input type="text" placeholder="Enter Name" name="title" required><br>
		<fieldset name="pets" id="tags" multiple>
			<legend>Choose your tags:</legend>
			<input type="checkbox" value="Maths">Maths</input>
			<input type="checkbox" value="Bio">Bio</input>
			<input type="checkbox" value="Dessin">Dessin</input>
			<input type="checkbox" value="Physique">Physique</input>
			<input type="checkbox" value="Chimie">Chimie</input>
		</select>
		</div><br>
		<div>
		<button type="submit">Submit</button>
		</div>
	</form>

<h2>Object Storage API - Upload Avatar</h2>
	<!-- Formulaire d'upload d'avatar -->
	<form id="avatarForm" enctype="multipart/form-data">
		<div>
		<label for="file">Choose file to upload</label><br>
		<input type="file" id="file" name="file" multiple />
		</div><br>
		<div>
		<button type="submit">Submit</button>
		</div>
	</form>

	<script>
	let authToken = null;

// Login
document.getElementById('loginForm').addEventListener('submit', async (e) => {
	e.preventDefault();
	const form = e.target;

	const res = await fetch('http://127.0.0.1:3334/api/v1/auth/login', {
		method: 'POST',
		headers: { 'Content-Type': 'application/json' },
		body: JSON.stringify({
			email: form.email.value,
			password: form.password.value,
		}),
	});

	const json = await res.json();
	if (!res.ok) {
		console.error('Login error :', json);
		alert('Login failed: ' + (json.message || 'Unknown error'));
		return;
	}
	authToken = json.data.token;
	console.log('Token récupéré :', authToken);
	alert('Connected! You can now upload your avatar.');
});

// create lesson
document.getElementById('createLessonForm').addEventListener('submit', async (e) => {
	e.preventDefault();
	const form = e.target;

	if (!authToken) {
		alert('Please login first !');
		return;
	}

	const tagsList = document.getElementById('tags');
	const selectedTags = [];
	for (const tag of tagsList.querySelectorAll('input[type="checkbox"]:checked')) {
		selectedTags.push(tag.value);
	}
	const res = await fetch('http://127.0.0.1:3333/lessons/', {
		method: 'GET',
		headers: { 'Content-Type': 'application/json' },
	// 	body: JSON.stringify({
	// 		title: form.title.value,
	// 		tags: selectedTags,
	// }),
	});
	const json = await res.text();
	console.log('Response upload :', json);
});

// Upload avatar
document.getElementById('avatarForm').addEventListener('submit', async (e) => {
	e.preventDefault();

	if (!authToken) {
		alert('Please login first !');
		return;
	}

	const formData = new FormData();
	const fileInput = document.getElementById('file');
	for (const file of fileInput.files) {
		formData.append('avatars[]', file); // avatars[] est le nom du type pour le validator
	}

	const res = await fetch('http://127.0.0.1:3334/profile/avatar', {
		method: 'POST',
		headers: {
			'Authorization': `Bearer ${authToken}`,
			// pas de Content-Type ici : fetch le gère automatiquement pour multi-part
		},
		body: formData,
	});

	const json = await res.text();
	console.log('Response upload :', json);
});

	</script>
</body>
</html>
