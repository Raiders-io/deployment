services:
### Web Server: interface for users to interact with the application
  nginx:
    container_name: nginx
    image: nginx:1.31.1-alpine-slim
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-html:/var/www/html:ro
      - nginx-certs:/etc/ssl/certs:ro
      - nginx-private:/etc/ssl/private:ro
    networks:
      - public-network
      - gateway-network
    ports:
      - "4443:443"
    depends_on:
      api-gateway:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O /dev/null https://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    restart: always

  api-gateway:
    build: 
      context: ./api-gateway
      target: production # production or dev
    container_name: api-gateway
    image: api-gateway:local
    environment:
      - PORT=3000
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:?}
      - MESSAGING_SERVICE_URL=${MESSAGING_SERVICE_URL:?}
    ports:
      - "3000:3000"
    networks:
      - api-network
      - gateway-network
    restart: always

networks:
  gateway-network:
    driver: bridge
    internal: true
  public-network:
    driver: bridge
    external: true
  api-network:
    driver: bridge
    external: true

volumes:
  nginx-html:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./nginx/html
  nginx-certs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./nginx/certs
  nginx-private:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./nginx/private
