networks:
  gateway-network:
    driver: bridge
    internal: true
  public-network:
    driver: bridge
    external: true
  api-network:
    driver: bridge
    external: true
  # monitoring-network:
  #   driver: bridge
  #   internal: true

volumes:
  nginx-html:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./nginx/html
  nginx-certs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./nginx/certs
  nginx-private:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./nginx/private
