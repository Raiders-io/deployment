services:
### Web Server: interface for users to interact with the application
  nginx:
    container_name: nginx
    image: nginx:1.31.1-alpine-slim
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/ssl/certs:ro
      - ./nginx/private:/etc/ssl/private:ro
      - ./nginx/html:/var/www/html:ro
    networks:
      - public-network
    ports:
      - "4443:443"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O /dev/null https://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    restart: always

  api-gateway:
    build: 
      context: ./api-gateway
      target: production # production or dev
    container_name: gateway-api
    image: gateway-api:local
    environment:
      - PORT=3000
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:?}
      - MESSAGING_SERVICE_URL=${MESSAGING_SERVICE_URL:?}
    ports:
      - "3000:3000"
    networks:
      - public-network
    depends_on:
      nginx:
        condition: service_healthy
    restart: always

networks:
  public-network:
    driver: bridge
    external: true
