services:
### Web Server: interface for users to interact with the application
  nginx:
    container_name: nginx
    build: 
      context: ./nginx
      args:
        OPENSSL_SUBJ: ${OPENSSL_SUBJ:?}
    environment:
        URL: ${URL:?}
    networks:
      - public-network
    ports:
      - "4443:443"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsk https://localhost/ | grep -q . || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5
    restart: always

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
    networks:
      - public-network
    depends_on:
      nginx:
        condition: service_healthy

networks:
  public-network:
    driver: bridge
    external: true
