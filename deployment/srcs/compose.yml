services:

### DevOps 
# Visualization tool for monitoring and analytics
  grafana:
    image: grafana/grafana
    container_name: grafana
    environment:
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:?}
    restart: unless-stopped
    ports:
      - '${GRAFANA_PORT:?}:3000'
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - basic-network

# Data collection for monitoring system
  prometheus:
    image: prom/prometheus:main #main-distroless is smaller image
    container_name: prometheus
    restart: unless-stopped
    ports:
      - '${PROMETHEUS_PORT:?}:9090'
    volumes:
      - prometheus-storage:/etc/prometheus
    networks:
      - basic-network

volumes:
  grafana-storage:
    name: "grafana-storage"
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${HOST_DATA_PATH}/data/grafana"
  prometheus-storage:
    name: "prometheus-storage"
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${HOST_DATA_PATH}/data/prometheus"

networks:
  basic-network:
    driver: bridge
    internal: false
