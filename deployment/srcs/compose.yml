services:

### DevOps 
# Visualization tool for monitoring and analytics
  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    environment:
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:?}
    ports:
      - '${GRAFANA_PORT:?}:3000' #default port is 3000
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - basic-network
    restart: unless-stopped


# Data collection for monitoring system
  prometheus:
    image: prom/prometheus:v3.11.2-distroless
    container_name: prometheus
    command:
      - '--web.listen-address=:9090'
      - '--config.file=/prometheus.yml'
    ports:
      - '${PROMETHEUS_PORT:?}:9090' #default port is 9090
    volumes:
      - prometheus-storage:/etc/prometheus/
      - ./prometheus.config.yml:/prometheus.yml
    networks:
      - basic-network
    restart: unless-stopped

volumes:
  grafana-storage:
    name: "grafana-storage"
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${HOST_DATA_PATH:?}/data/grafana"
  prometheus-storage:
    name: "prometheus-storage"
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${HOST_DATA_PATH:?}/data/prometheus"

networks:
  basic-network:
    driver: bridge
    internal: false
